display_name: AI Workflow Installer
short_description: Install AI workflow docs with Markdown context synthesis, triage, subagents, frontend runtime, context sync, security, evidence, research, and cost gates.
default_prompt: Install or update the standard AI workflow documentation kit in this repository. Auto-detect whether this is a fresh install, existing-project onboarding, update, or migration; inspect the repo, synthesize existing Markdown context before archive/update, generate initial context, and include triage/intake, real subagent orchestration guidance, discovery/planning for vague requests, frontend reuse standards, visual/runtime validation, living context sync, external GitHub design system guidance with gh access checks, research workflows, security baseline, validation evidence, and cost approval gates.
